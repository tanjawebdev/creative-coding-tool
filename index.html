<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII VIDEO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@latest/build/mp4-muxer.min.js"></script>
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --accent: #39ff14;
    --dim: #333;
    --panel: #0a0a0a;
    --border: #1e1e1e;
    --label: #555;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    height: 100vh;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .logo {
    font-family: 'VT323', monospace;
    font-size: 28px;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(57,255,20,0.4);
  }

  .logo span { color: var(--dim); }

  .header-meta {
    font-size: 11px;
    color: var(--label);
    text-align: right;
    line-height: 1.8;
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--label);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* Upload zone */
  .drop-zone {
    border: 1px dashed var(--dim);
    padding: 24px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.over {
    border-color: var(--accent);
    background: rgba(57,255,20,0.03);
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-zone .dz-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-zone .dz-text { font-size: 12px; color: var(--label); line-height: 1.6; }
  .drop-zone .dz-text strong { color: var(--fg); }
  .drop-zone .dz-filename {
    margin-top: 10px;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Controls */
  .control-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 14px;
  }

  .control-row label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--label);
    letter-spacing: 1px;
  }

  .control-row label .val {
    color: var(--accent);
    font-size: 12px;
    min-width: 40px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--dim);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 0;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(57,255,20,0.5);
  }

  input[type=text], select, textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  input[type=text]:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  select option { background: #111; }

  .chars-preview {
    font-size: 10px;
    color: var(--label);
    word-break: break-all;
    line-height: 1.5;
    margin-top: 4px;
    min-height: 20px;
  }

  /* Color controls */
  .color-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .color-swatch {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .color-swatch label { font-size: 10px; color: var(--label); letter-spacing: 1px; }
  .color-swatch input[type=color] {
    width: 100%;
    height: 32px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-preview {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .btn-preview:hover { background: rgba(57,255,20,0.08); }

  .btn-export {
    background: var(--accent);
    color: #000;
    font-weight: bold;
  }
  .btn-export:hover { background: #4dff25; box-shadow: 0 0 20px rgba(57,255,20,0.3); }
  .btn-export:disabled {
    background: var(--dim);
    color: var(--label);
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Progress */
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .progress-wrap.active { display: flex; }
  .progress-bar-bg {
    width: 100%;
    height: 2px;
    background: var(--dim);
    position: relative;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px rgba(57,255,20,0.6);
  }
  .progress-text {
    font-size: 11px;
    color: var(--label);
    text-align: center;
  }

  /* ── MAIN / PREVIEW ── */
  main {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
    position: relative;
  }

  #preview-canvas {
    max-width: 100%;
    max-height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: var(--dim);
    text-align: center;
  }
  .empty-state .es-icon { font-size: 64px; opacity: 0.3; }
  .empty-state p { font-size: 13px; letter-spacing: 2px; }

  /* frame scrubber */
  .scrubber-wrap {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: min(600px, 80%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .scrubber-wrap.visible { display: flex; }
  .scrubber-wrap input[type=range] { width: 100%; }
  .scrubber-label {
    font-size: 10px;
    color: var(--label);
    letter-spacing: 2px;
  }

  /* scanline overlay */
  main::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim); }
</style>
</head>
<body>

<header>
  <div class="logo">ASCII<span>//</span>VIDEO</div>
  <div class="header-meta">
    Live Preview + 4K Export<br>
    Keine Installation · Läuft im Browser
  </div>
</header>

<aside>

  <!-- Upload -->
  <div>
    <div class="section-label">01 — Input</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="video/*">
      <div class="dz-icon">▶</div>
      <div class="dz-text"><strong>Video hochladen</strong><br>oder hierher ziehen<br><span style="font-size:10px;color:#444">MP4, MOV, WebM, AVI</span></div>
      <div class="dz-filename" id="dzFilename"></div>
    </div>
  </div>

  <!-- ASCII Settings -->
  <div>
    <div class="section-label">02 — ASCII</div>

    <div class="control-row">
      <label>Spalten (Columns) <span class="val" id="colsVal">160</span></label>
      <input type="range" id="colsRange" min="40" max="400" value="160" step="10">
    </div>

    <div class="control-row">
      <label>Char-Aspekt (Höhe/Breite) <span class="val" id="aspectVal">2.0</span></label>
      <input type="range" id="aspectRange" min="1.0" max="3.0" value="2.0" step="0.1">
    </div>

    <div class="control-row">
      <label>Font</label>
      <select id="fontSelect">
        <option value="'Courier New', monospace">Courier New</option>
        <option value="'Lucida Console', monospace">Lucida Console</option>
        <option value="'Share Tech Mono', monospace">Share Tech Mono</option>
        <option value="'VT323', monospace">VT323</option>
        <option value="monospace">System Monospace</option>
      </select>
    </div>

    <div class="control-row">
      <label>ASCII Chars</label>
      <textarea id="charsInput" rows="2"> .`-_':,;^=+/"|)\<>iv%xclrs{*}I?!][1taeo7zjLunT#JCwfy325Vb6mqkdWM8&0@$</textarea>
      <div class="chars-preview" id="charsPreview"></div>
    </div>
  </div>

  <!-- Output Settings -->
  <div>
    <div class="section-label">03 — Output</div>

    <div class="control-row">
      <label>Auflösung</label>
      <select id="resSelect">
        <option value="3840x2160">4K — 3840×2160</option>
        <option value="1920x1080" selected>Full HD — 1920×1080</option>
        <option value="1280x720">HD — 1280×720</option>
        <option value="854x480">SD — 854×480</option>
      </select>
    </div>

    <div class="control-row">
      <label>Font-Größe (px) <span class="val" id="fontSizeVal">auto</span></label>
      <input type="range" id="fontSizeRange" min="0" max="60" value="0" step="1">
      <div style="font-size:10px;color:#444;margin-top:3px">0 = automatisch</div>
    </div>

    <div class="color-row">
      <div class="color-swatch">
        <label>HINTERGRUND</label>
        <input type="color" id="bgColor" value="#000000">
      </div>
      <div class="color-swatch">
        <label>TEXT</label>
        <input type="color" id="fgColor" value="#ffffff">
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div style="display:flex;flex-direction:column;gap:10px;">
    <button class="btn btn-preview" id="previewBtn" disabled>▶ Preview aktualisieren</button>
    <button class="btn btn-export" id="exportBtn" disabled>⬇ MP4 exportieren</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Initialisiere...</div>
    </div>
  </div>

</aside>

<main id="mainArea">
  <div class="empty-state" id="emptyState">
    <div class="es-icon">▒</div>
    <p>Lade ein Video hoch<br>um die Preview zu starten</p>
  </div>
  <canvas id="preview-canvas" style="display:none;"></canvas>
  <div class="scrubber-wrap" id="scrubberWrap">
    <input type="range" id="scrubber" min="0" max="100" value="0">
    <div class="scrubber-label">FRAME SCRUBBER — ziehe um Frames zu vergleichen</div>
  </div>
</main>

<!-- Hidden video element for frame extraction -->
<video id="hiddenVideo" style="display:none" crossorigin="anonymous" preload="auto"></video>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let videoFile = null;
let videoEl = document.getElementById('hiddenVideo');
let videoReady = false;
let totalFrames = 0;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const fileInput    = document.getElementById('fileInput');
const dropZone     = document.getElementById('dropZone');
const dzFilename   = document.getElementById('dzFilename');
const colsRange    = document.getElementById('colsRange');
const colsVal      = document.getElementById('colsVal');
const aspectRange  = document.getElementById('aspectRange');
const aspectVal    = document.getElementById('aspectVal');
const fontSelect   = document.getElementById('fontSelect');
const charsInput   = document.getElementById('charsInput');
const charsPreview = document.getElementById('charsPreview');
const resSelect    = document.getElementById('resSelect');
const fontSizeRange= document.getElementById('fontSizeRange');
const fontSizeVal  = document.getElementById('fontSizeVal');
const bgColor      = document.getElementById('bgColor');
const fgColor      = document.getElementById('fgColor');
const previewBtn   = document.getElementById('previewBtn');
const exportBtn    = document.getElementById('exportBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const previewCanvas= document.getElementById('preview-canvas');
const emptyState   = document.getElementById('emptyState');
const scrubberWrap = document.getElementById('scrubberWrap');
const scrubber     = document.getElementById('scrubber');

// ── Params ───────────────────────────────────────────────────────────────────
function getParams() {
  const [outW, outH] = resSelect.value.split('x').map(Number);
  const cols = parseInt(colsRange.value);
  const aspect = parseFloat(aspectRange.value);
  const manualFontSize = parseInt(fontSizeRange.value);
  const fontSize = manualFontSize > 0 ? manualFontSize : null; // null = auto
  return {
    cols, aspect, fontSize,
    font: fontSelect.value,
    chars: charsInput.value || ' .:-=+*#@',
    outW, outH,
    bg: bgColor.value,
    fg: fgColor.value,
  };
}

// ── Live labels ──────────────────────────────────────────────────────────────
colsRange.addEventListener('input', () => { colsVal.textContent = colsRange.value; autoPreview(); });
aspectRange.addEventListener('input', () => { aspectVal.textContent = parseFloat(aspectRange.value).toFixed(1); autoPreview(); });
fontSizeRange.addEventListener('input', () => {
  const v = parseInt(fontSizeRange.value);
  fontSizeVal.textContent = v === 0 ? 'auto' : v + 'px';
  autoPreview();
});
charsInput.addEventListener('input', () => { updateCharsPreview(); autoPreview(); });
fontSelect.addEventListener('change', autoPreview);
resSelect.addEventListener('change', autoPreview);
bgColor.addEventListener('input', autoPreview);
fgColor.addEventListener('input', autoPreview);

function updateCharsPreview() {
  charsPreview.textContent = `${charsInput.value.length} Zeichen`;
}
updateCharsPreview();

// ── File handling ─────────────────────────────────────────────────────────────
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  if (!file || !file.type.startsWith('video/')) return;
  videoFile = file;
  dzFilename.textContent = file.name;
  const url = URL.createObjectURL(file);
  videoEl.src = url;
  videoEl.addEventListener('loadedmetadata', () => {
    videoReady = true;
    totalFrames = Math.round(videoEl.duration * 30); // estimate
    scrubber.max = Math.max(1, Math.round(videoEl.duration * 10));
    previewBtn.disabled = false;
    exportBtn.disabled = false;
    renderPreviewAtTime(0);
  }, { once: true });
}

// ── Preview ───────────────────────────────────────────────────────────────────
let previewDebounce = null;
function autoPreview() {
  if (!videoReady) return;
  clearTimeout(previewDebounce);
  previewDebounce = setTimeout(() => renderPreviewAtTime(videoEl.currentTime), 80);
}

previewBtn.addEventListener('click', () => {
  if (videoReady) renderPreviewAtTime(videoEl.currentTime);
});

scrubber.addEventListener('input', () => {
  if (!videoReady) return;
  const t = parseFloat(scrubber.value) / 10;
  videoEl.currentTime = t;
  videoEl.addEventListener('seeked', () => renderPreviewAtTime(t), { once: true });
});

async function renderPreviewAtTime(t) {
  if (!videoReady) return;
  const p = getParams();

  // Draw video frame to small offscreen canvas for sampling
  const sampleW = 640;
  const sampleH = Math.round(sampleW * videoEl.videoHeight / videoEl.videoWidth);
  const sampleCanvas = new OffscreenCanvas(sampleW, sampleH);
  const sCtx = sampleCanvas.getContext('2d');
  sCtx.drawImage(videoEl, 0, 0, sampleW, sampleH);

  // Render ASCII to preview canvas
  previewCanvas.width  = p.outW;
  previewCanvas.height = p.outH;
  renderAsciiFrame(sampleCanvas, previewCanvas, p);

  emptyState.style.display = 'none';
  previewCanvas.style.display = 'block';
  scrubberWrap.classList.add('visible');
}

// ── Core render ───────────────────────────────────────────────────────────────
function renderAsciiFrame(srcCanvas, dstCanvas, p) {
  const { cols, aspect, font, chars, outW, outH, bg, fg } = p;
  const ctx = dstCanvas.getContext ? dstCanvas.getContext('2d') : dstCanvas.getContext('2d');

  const srcW = srcCanvas.width;
  const srcH = srcCanvas.height;

  const cellW = srcW / cols;
  const cellH = cellW * aspect;
  const rows  = Math.ceil(srcH / cellH);

  // Font size: auto = fill output width by cols
  const fontSize = p.fontSize !== null ? p.fontSize : outW / cols;
  ctx.font = `${fontSize}px ${font}`;
  const charW = ctx.measureText('M').width;
  const charH = fontSize * 1.2;

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, outW, outH);
  ctx.fillStyle = fg;
  ctx.textBaseline = 'top';

  const srcCtx = srcCanvas.getContext('2d');
  const imgData = srcCtx.getImageData(0, 0, srcW, srcH);
  const px = imgData.data;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const sx = Math.min(Math.floor((col + 0.5) * cellW), srcW - 1);
      const sy = Math.min(Math.floor((row + 0.5) * cellH), srcH - 1);
      const i  = (sy * srcW + sx) * 4;
      const brightness = 0.299 * px[i] + 0.587 * px[i+1] + 0.114 * px[i+2];
      const ci = Math.floor((brightness / 255) * (chars.length - 1));
      const ch = chars[ci];
      if (ch !== ' ') ctx.fillText(ch, col * charW, row * charH);
    }
  }
}

// ── Export ────────────────────────────────────────────────────────────────────
exportBtn.addEventListener('click', startExport);

// Pick correct AVC codec string for a given resolution
// avc1.PPCCLL — PP=profile(42=baseline), CC=constraints, LL=level
function getCodecString(w, h) {
  const pixels = w * h;
  if (pixels <= 409600)  return 'avc1.42001e'; // Level 3.0  — up to 720×576
  if (pixels <= 921600)  return 'avc1.420028'; // Level 4.0  — up to 1920×1080 (wait — 40 hex)
  if (pixels <= 2073600) return 'avc1.640032'; // Level 5.0  High profile — up to 1920×1080 comfortably
  return 'avc1.640033';                         // Level 5.1  High profile — 4K
}

async function startExport() {
  if (!videoReady) return;
  if (!window.VideoEncoder) {
    alert('Dein Browser unterstützt die WebCodecs API nicht.\nBitte Chrome 94+ oder Edge 94+ verwenden.');
    return;
  }

  exportBtn.disabled = true;
  previewBtn.disabled = true;
  progressWrap.classList.add('active');

  const p = getParams();
  const fps = 30;
  const duration = videoEl.duration;
  const frameCount = Math.round(duration * fps);
  const codec = getCodecString(p.outW, p.outH);

  setProgress(0, `Vorbereitung... (${frameCount} Frames)`);

  // ── Use mp4-muxer for reliable MP4 output ──────────────────────────────
  const muxer = new Mp4Muxer.Muxer({
    target: new Mp4Muxer.ArrayBufferTarget(),
    video: {
      codec: 'avc',
      width: p.outW,
      height: p.outH,
    },
    fastStart: 'in-memory',
  });

  let encoderError = null;
  const encoder = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error: (e) => { encoderError = e; console.error('Encoder error:', e); },
  });

  // Check if codec is supported before configuring
  const support = await VideoEncoder.isConfigSupported({
    codec,
    width: p.outW,
    height: p.outH,
    bitrate: 40_000_000,
    framerate: fps,
  });

  if (!support.supported) {
    alert(`Codec nicht unterstützt für ${p.outW}×${p.outH}.\nBitte eine niedrigere Auflösung wählen.`);
    exportBtn.disabled = false;
    previewBtn.disabled = false;
    progressWrap.classList.remove('active');
    return;
  }

  encoder.configure({
    codec,
    width: p.outW,
    height: p.outH,
    bitrate: 40_000_000,
    framerate: fps,
    avc: { format: 'avc' }, // AVCC format (not Annex B) — required by mp4-muxer
  });

  // Sample canvas (small, for pixel reading)
  const sampleW = Math.min(640, videoEl.videoWidth);
  const sampleH = Math.round(sampleW * videoEl.videoHeight / videoEl.videoWidth);
  const sampleCanvas = new OffscreenCanvas(sampleW, sampleH);
  const sampleCtx = sampleCanvas.getContext('2d');

  // Output canvas (full resolution)
  const outCanvas = new OffscreenCanvas(p.outW, p.outH);

  for (let f = 0; f < frameCount; f++) {
    if (encoderError) break;

    const t = f / fps;
    videoEl.currentTime = t;
    await new Promise(res => videoEl.addEventListener('seeked', res, { once: true }));

    sampleCtx.drawImage(videoEl, 0, 0, sampleW, sampleH);
    renderAsciiFrame(sampleCanvas, outCanvas, p);

    const bitmap = await createImageBitmap(outCanvas);
    const vf = new VideoFrame(bitmap, {
      timestamp: Math.round(t * 1_000_000),
      duration:  Math.round(1_000_000 / fps),
    });

    const isKey = f % 30 === 0;
    encoder.encode(vf, { keyFrame: isKey });
    vf.close();
    bitmap.close();

    // Keep encoder queue from growing unbounded
    if (encoder.encodeQueueSize > 10) {
      await new Promise(res => { encoder.ondequeue = () => { if (encoder.encodeQueueSize <= 5) res(); }; });
    }

    const pct = ((f + 1) / frameCount) * 88;
    setProgress(pct, `Rendere Frame ${f + 1} / ${frameCount}`);

    // Yield to browser every few frames
    if (f % 3 === 0) await new Promise(r => setTimeout(r, 0));
  }

  if (encoderError) {
    alert('Encoder-Fehler: ' + encoderError.message);
    exportBtn.disabled = false;
    previewBtn.disabled = false;
    progressWrap.classList.remove('active');
    return;
  }

  setProgress(90, 'Encoder flushen...');
  await encoder.flush();
  encoder.close();

  setProgress(96, 'MP4 finalisieren...');
  muxer.finalize();

  setProgress(100, 'Fertig! Download startet...');
  const { buffer } = muxer.target;
  const blob = new Blob([buffer], { type: 'video/mp4' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'ascii-video.mp4';
  a.click();

  setTimeout(() => URL.revokeObjectURL(url), 5000);

  setTimeout(() => {
    progressWrap.classList.remove('active');
    exportBtn.disabled = false;
    previewBtn.disabled = false;
    setProgress(0, '');
  }, 3000);
}

function setProgress(pct, text) {
  progressFill.style.width = pct + '%';
  progressText.textContent = text;
}
</script>
</body>
</html>

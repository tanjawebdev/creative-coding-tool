<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Coding Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@latest/build/mp4-muxer.min.js"></script>
</head>

<body>

  <header>
    <div class="logo">CREATIVE<span>//</span>CODING</div>
    <div class="header-meta">
      Live Preview + 4K Export<br>
      Keine Installation · Läuft im Browser
    </div>
  </header>

  <aside>

    <!-- 01 — Input -->
    <div>
      <div class="section-label">01 — Input</div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="video/*">
        <div class="dz-icon">▶</div>
        <div class="dz-text">
          <strong>Video hochladen</strong><br>oder hierher ziehen<br>
          <span style="font-size:10px;color:#444">MP4, MOV, WebM, AVI</span>
        </div>
        <div class="dz-filename" id="dzFilename"></div>
      </div>

      <!-- Adjust Footage (collapsible) -->
      <details class="accordion" id="adjustFootage">
        <summary class="accordion-toggle">Adjust Footage</summary>
        <div class="accordion-body">
          <div class="control-row">
            <label>Helligkeit <span class="val" id="brightnessVal">100%</span></label>
            <input type="range" id="brightnessRange" min="0" max="300" value="100" step="5">
          </div>
          <div class="control-row">
            <label>Kontrast <span class="val" id="contrastVal">100%</span></label>
            <input type="range" id="contrastRange" min="0" max="300" value="100" step="5">
          </div>
          <div class="control-row">
            <label>Sättigung <span class="val" id="saturationVal">100%</span></label>
            <input type="range" id="saturationRange" min="0" max="300" value="100" step="5">
          </div>
          <div class="control-row">
            <label>Gamma <span class="val" id="gammaVal">1.0</span></label>
            <input type="range" id="gammaRange" min="0.2" max="3.0" value="1.0" step="0.1">
          </div>
          <button class="btn-preset" id="resetAdjustBtn" style="width:100%;margin-top:4px;">↺ Zurücksetzen</button>
        </div>
      </details>
    </div>

    <!-- 02 — Theme -->
    <div>
      <div class="section-label">02 — Theme</div>
      <div class="control-row">
        <label>Effekt</label>
        <select id="themeSelect"></select>
      </div>
      <div id="themeControls">
        <!-- Filled dynamically by the active theme -->
      </div>
    </div>

    <!-- 03 — Output -->
    <div>
      <div class="section-label">03 — Output</div>

      <div class="control-row">
        <label>Auflösung</label>
        <select id="resSelect">
          <option value="3840x2160">4K — 3840×2160</option>
          <option value="1920x1080" selected>Full HD — 1920×1080</option>
          <option value="1280x720">HD — 1280×720</option>
          <option value="854x480">SD — 854×480</option>
        </select>
      </div>

      <div class="color-row">
        <div class="color-swatch">
          <label>HINTERGRUND</label>
          <input type="color" id="bgColor" value="#000000">
        </div>
        <div class="color-swatch">
          <label>TEXT</label>
          <input type="color" id="fgColor" value="#ffffff">
        </div>
      </div>
    </div>

    <!-- 04 — Presets -->
    <div>
      <div class="section-label">04 — Presets</div>
      <div class="preset-row">
        <button class="btn-preset" id="importPresetBtn" title="Preset aus JSON laden">↑ Import</button>
        <button class="btn-preset" id="exportPresetBtn" title="Einstellungen als JSON speichern">↓ Export</button>
      </div>
      <input type="file" id="presetFileInput" accept=".json" style="display:none">
    </div>

    <!-- Actions -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-preview" id="previewBtn" disabled>▶ Preview aktualisieren</button>
      <button class="btn btn-export" id="exportBtn" disabled>⬇ MP4 exportieren</button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">Initialisiere...</div>
      </div>
    </div>

  </aside>

  <main id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="es-icon">▒</div>
      <p>Lade ein Video hoch<br>um die Preview zu starten</p>
    </div>
    <canvas id="preview-canvas" style="display:none;"></canvas>
    <div class="scrubber-wrap" id="scrubberWrap">
      <div class="scrubber-row">
        <button class="play-btn" id="playPauseBtn" title="Play / Pause">▶</button>
        <input type="range" id="scrubber" min="0" max="100" value="0">
        <span class="scrubber-time" id="scrubberTime">0:00 / 0:00</span>
      </div>
      <div class="scrubber-label">FRAME SCRUBBER</div>
    </div>
  </main>

  <!-- Hidden video element for frame extraction -->
  <video id="hiddenVideo" style="display:none" crossorigin="anonymous" preload="auto"></video>

  <!-- Scripts: themes first, then export, then app (app initializes everything) -->
  <script src="js/themes/ascii.js"></script>
  <script src="js/themes/rasterize.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
